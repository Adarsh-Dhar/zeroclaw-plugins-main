name = "spl-transfer-build"
version = "0.1.0"
wasm_path = "target/wasm32-wasip2/release/spl_transfer_build.wasm"
capabilities = ["tool"]
permissions = ["http_client", "config_read"]

[config]
# Override to point at your own RPC (mainnet, devnet, or a private
# endpoint). Falls back to public devnet if unset — see README.
rpc_url = "https://api.devnet.solana.com"
# Comma-separated base58 wallet owners this build-only tool may target. An
# empty value allows no recipients, so deployment fails closed by default.
allowed_recipients = ""
